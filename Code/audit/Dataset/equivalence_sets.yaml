# Equivalence sets for counterfactual slot (c) in the MIRAGE pentad probe.
#
# Implements / builds on / cites:
#   - Parrish et al. (2022). "BBQ." Findings of ACL 2022.
#   - Zhao et al. (2018). "WinoBias." NAACL 2018.
#   - Kusner et al. (2018). "Counterfactual Fairness." NeurIPS 2017.
#
